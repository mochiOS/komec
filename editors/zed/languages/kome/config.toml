name = "Kome"
grammar = "kome"
path_suffixes = [
  "kome",
]

line_comments = [
  "// ",
]

tab_size = 4
hard_tabs = false

brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = [
    "string",
    "comment"
  ] },
]
